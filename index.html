<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMB | Premium Dashboard</title>

    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/QNkbRTbS/1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #e11d48;
            --accent-hover: #be123c;
            --bg: #1f2937;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s ease;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            padding: 15px;
            color: var(--text-dark);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* ===== AUTH BLOCKS ===== */
        #login, #user-info {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: none;
        }

        #user-info {
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            text-align: left;
            padding: 12px 15px;
            max-width: 100%;
        }

        #user-pic {
            border-radius: 12px;
            width: 44px;
            height: 44px;
            object-fit: cover;
        }

        .user-details p { margin: 0; font-size: 14px; font-weight: 700; }
        #user-email { font-weight: 400; color: var(--text-muted); font-size: 12px; }

        #logout-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        #logout-btn:hover { background: var(--accent); color: white; }

        /* ===== ACTION GRID ===== */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            cursor: pointer;
        }

        .action-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .action-card:active {
            transform: translateY(-1px);
        }

        .action-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            border-radius: 20px;
        }

        .action-btn i {
            font-size: 26px;
            color: #1f2937;
            transition: color 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        .action-btn span {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            color: var(--text-dark);
            pointer-events: none;
        }

        .action-card:hover .action-btn i {
            color: var(--accent);
            transform: scale(1.05);
        }

        /* ===== BOTTOM SHEET (по ширине кнопок) ===== */
        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            z-index: 100;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
        }

        .bottom-sheet.active {
            transform: translateX(-50%) translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 10px;
            margin: 0 auto 20px auto;
            opacity: 0.5;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            text-align: center;
        }

        .sheet-clubs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .club-sheet-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f8fafc;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .club-sheet-btn:hover {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
            transform: translateX(5px);
        }

        .club-sheet-btn i {
            color: #1f2937;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .club-sheet-btn:hover i {
            color: white;
        }

        .close-sheet-btn {
            width: 100%;
            padding: 16px;
            background: none;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .close-sheet-btn:hover {
            background: #f1f5f9;
            border-color: var(--text-muted);
        }

        /* Эффект пульсации */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .action-card.pulse {
            animation: pulse 0.5s ease;
        }

        .disabled { 
            opacity: 0.4; 
            pointer-events: none; 
            filter: grayscale(1);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .bottom-sheet {
                max-width: 100%;
                left: 0;
                transform: translateX(0) translateY(100%);
            }
            .bottom-sheet.active {
                transform: translateX(0) translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <div style="width: 50px; height: 50px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-shield-halved" style="font-size: 24px; color: var(--accent);"></i>
        </div>
        <h2 style="margin: 0 0 5px; font-weight: 800; font-size: 20px;">SMB Dashboard</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Sign in to access</p>
        <div id="g_id_onload" 
             data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse" 
             data-auto_prompt="false"
             data-auto_select="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="outline" 
             data-text="signin_with" 
             data-size="large" 
             data-logo_alignment="left">
        </div>
    </div>

    <div id="user-info">
        <img id="user-pic" src="" alt="Profile">
        <div class="user-details" style="flex-grow:1">
            <p id="user-name"></p>
            <p id="user-email"></p>
        </div>
        <button id="logout-btn" onclick="signOut()"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="main-content" id="main-content" style="display:none; width: 100%;">
        <div class="action-grid">
            <div class="action-card" id="manuals-btn">
                <a href="https://smart-bowling.github.io/MANUALS-SMART/" class="action-btn">
                    <i class="fas fa-book-open"></i>
                    <span>Manuals</span>
                </a>
            </div>
            <div class="action-card" id="store-btn">
                <a href="https://smart-bowling.github.io/PARTS-STORE/" class="action-btn">
                    <i class="fas fa-bag-shopping"></i>
                    <span>Store</span>
                </a>
            </div>
            <div class="action-card" id="card-parts">
                <button class="action-btn" onclick="handleAction('parts', this)">
                    <i class="fas fa-gears"></i>
                    <span>Parts</span>
                </button>
            </div>
            <div class="action-card" id="card-maintenance">
                <button class="action-btn" onclick="handleAction('maintenance', this)">
                    <i class="fas fa-screwdriver-wrench"></i>
                    <span>Maintenance</span>
                </button>
            </div>
            <div class="action-card" id="card-fps">
                <button class="action-btn" onclick="handleAction('fps', this)">
                    <i class="fas fa-chart-line"></i>
                    <span>FPS</span>
                </button>
            </div>
            <div class="action-card" id="card-analysis">
                <button class="action-btn" onclick="handleAction('analysis', this)">
                    <i class="fas fa-bowling-ball"></i>
                    <span>Analysis</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet для выбора клуба -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="clubSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Выберите клуб</div>
    <div class="sheet-clubs-list" id="sheetClubsList"></div>
    <button class="close-sheet-btn" onclick="closeClubSheet()">Закрыть</button>
</div>

<script>
function handleCredentialResponse(response) {
    try {
        const payload = parseJwt(response.credential);
        const email = payload.email.toLowerCase();
        
        if (userPermissions[email]) {
            loginUser(payload);
        } else {
            alert('Access Denied: Your email is not authorized');
        }
    } catch (e) {
        alert('Authentication error');
    }
}

const userPermissions = {
    'vadiksss900@gmail.com': { manuals:true, store:true, luckyStrike:{parts:true,maintenance:true,fps:true}, blockbuster:{parts:true,maintenance:true,analysis:true,fps:true}, skymall:{parts:true,maintenance:true,analysis:true,fps:true} },
    'csportsua@gmail.com': { manuals:true, store:false, luckyStrike:{parts:false,maintenance:false,fps:false}, blockbuster:{parts:false,maintenance:false,analysis:false,fps:false}, skymall:{parts:true,maintenance:false,analysis:false,fps:false} }
};

const linksMap = {
    parts:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PARTS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PARTS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PARTS-SKYMALL/', key:'skymall'}
    ],
    maintenance:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/SMB-LS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/SMB-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/SMB-SKYMALL/', key:'skymall'}
    ],
    fps:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PS-STOP-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PS-STOP-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PS-STOP-SKYMALL/', key:'skymall'}
    ],
    analysis:[
        {name:'Blockbuster', url:'https://smart-bowling.github.io/ANALYSIS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/ANALYSIS-SM/', key:'skymall'}
    ]
};

function loginUser(payload) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    applyPermissions(payload.email.toLowerCase());
}

function handleAction(type, buttonElement) {
    const email = localStorage.getItem('userEmail');
    const p = userPermissions[email];
    const available = linksMap[type].filter(item => p[item.key] && p[item.key][type]);
    
    if (available.length === 1) {
        window.location.href = available[0].url;
    } else if (available.length > 1) {
        const card = buttonElement.closest('.action-card');
        card.classList.add('pulse');
        setTimeout(() => card.classList.remove('pulse'), 500);
        
        showClubSheet(type, available);
    }
}

function showClubSheet(type, clubs) {
    const sheet = document.getElementById('clubSheet');
    const overlay = document.getElementById('sheetOverlay');
    const title = document.getElementById('sheetTitle');
    const listContainer = document.getElementById('sheetClubsList');
    
    let typeName = {
        parts: 'Запчасти',
        maintenance: 'Обслуживание',
        fps: 'FPS',
        analysis: 'Аналитика'
    }[type] || type;
    title.textContent = `Выберите клуб: ${typeName}`;
    
    listContainer.innerHTML = '';
    clubs.forEach(club => {
        const btn = document.createElement('a');
        btn.href = club.url;
        btn.className = 'club-sheet-btn';
        btn.innerHTML = `${club.name} <i class="fas fa-arrow-right"></i>`;
        listContainer.appendChild(btn);
    });
    
    sheet.classList.add('active');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeClubSheet() {
    const sheet = document.getElementById('clubSheet');
    const overlay = document.getElementById('sheetOverlay');
    
    sheet.classList.remove('active');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
}

function applyPermissions(email) {
    const p = userPermissions[email];
    document.getElementById('manuals-btn').classList.toggle('disabled', !p.manuals);
    document.getElementById('store-btn').classList.toggle('disabled', !p.store);
    
    Object.keys(linksMap).forEach(type => {
        const hasAccess = linksMap[type].some(item => p[item.key] && p[item.key][type]);
        document.getElementById(`card-${type}`).classList.toggle('disabled', !hasAccess);
    });
}

function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}

function signOut() { 
    localStorage.clear(); 
    location.reload(); 
}

document.getElementById('sheetOverlay').addEventListener('click', closeClubSheet);

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeClubSheet();
    }
});

window.onload = function() {
    if (localStorage.getItem('userLoggedIn') === 'true') {
        const email = localStorage.getItem('userEmail');
        const name = localStorage.getItem('userName');
        const pic = localStorage.getItem('userPic');
        
        if (userPermissions[email]) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-info').style.display = 'flex';
            
            document.getElementById('user-name').textContent = name || 'User';
            document.getElementById('user-email').textContent = email;
            if (pic) document.getElementById('user-pic').src = pic;
            
            applyPermissions(email);
        } else {
            signOut();
        }
    }
};
</script>
</body>
</html>
