<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMB | Premium Dashboard</title>

    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/QNkbRTbS/1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #e11d48;
            --accent-hover: #be123c;
            --bg: #1f2937; /* Новый цвет фона */
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            --border-soft: 2px solid #4b5563;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --blur: blur(10px);
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg); /* Простой фон #1f2937 */
            font-family: 'Inter', sans-serif;
            padding: 15px;
            color: var(--text-dark);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* ===== AUTH BLOCKS ===== */
        #login, #user-info, #access-denied {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid #4b5563;
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        #user-info {
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            text-align: left;
            padding: 12px 15px;
            max-width: 100%;
            background: var(--card-bg);
        }

        #user-pic {
            border-radius: 12px;
            width: 44px;
            height: 44px;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .user-details p { margin: 0; font-size: 14px; font-weight: 700; color: var(--text-dark); }
        #user-email { font-weight: 400; color: var(--text-muted); font-size: 12px; }

        #logout-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        #logout-btn:hover { background: var(--accent); color: white; }

        /* ===== ACTION GRID ===== */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: visible;
            box-shadow: var(--shadow);
            border: 1px solid #4b5563;
            transition: var(--transition);
            position: relative;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .action-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            border-radius: 20px;
            position: relative;
            z-index: 2;
        }

        .action-btn i {
            font-size: 26px;
            color: var(--accent);
            transition: var(--transition);
        }

        .action-btn span {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            color: var(--text-dark);
        }

        .action-card:hover .action-btn i {
            color: var(--accent-hover);
            transform: scale(1.1);
        }

        /* ===== НОВЫЙ СТИЛЬ ДЛЯ КНОПОК КЛУБОВ ===== */
        .club-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .club-bubble {
            position: absolute;
            background: var(--card-bg);
            padding: 12px 18px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            border: 2px solid var(--accent);
            backdrop-filter: var(--blur);
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 20;
        }

        .club-bubble.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .club-bubble:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1) !important;
            box-shadow: 0 15px 35px rgba(225, 29, 72, 0.4);
            border-color: white;
        }

        .club-bubble i {
            font-size: 12px;
            transition: transform 0.3s ease;
            color: var(--accent);
        }

        .club-bubble:hover i {
            transform: translateX(3px);
            color: white;
        }

        /* Позиции для баблов */
        .club-bubble.pos-1 { top: -20px; right: -20px; }
        .club-bubble.pos-2 { bottom: -20px; left: -20px; }
        .club-bubble.pos-3 { top: 50%; right: -30px; transform: translateY(-50%) scale(0.3); }
        .club-bubble.pos-3.active { transform: translateY(-50%) scale(1); }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .action-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 12px;
            }
            .action-btn { padding: 10px; }
            .action-btn i { font-size: 24px; }
            .action-btn span { font-size: 10px; }
            
            .club-bubble {
                padding: 8px 14px;
                font-size: 11px;
            }
            .club-bubble.pos-1 { top: -15px; right: -15px; }
            .club-bubble.pos-2 { bottom: -15px; left: -15px; }
            .club-bubble.pos-3 { right: -20px; }
        }

        .disabled { 
            opacity: 0.4; 
            pointer-events: none; 
            filter: grayscale(1);
        }

        .disabled .action-btn i {
            color: var(--text-muted);
        }

        /* Эффект пульсации при активации */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .action-card.pulse {
            animation: pulse 1s ease;
        }

        /* Стили для текста в login */
        #login h2 {
            color: var(--text-dark);
        }

        .g_id_signin > div {
            margin: 0 auto !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <div style="width: 50px; height: 50px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-shield-halved" style="font-size: 24px; color: var(--accent);"></i>
        </div>
        <h2 style="margin: 0 0 5px; font-weight: 800; font-size: 20px;">SMB Dashboard</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Sign in to access</p>
        <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
    </div>

    <div id="user-info">
        <img id="user-pic" src="" alt="Profile">
        <div class="user-details" style="flex-grow:1">
            <p id="user-name"></p>
            <p id="user-email"></p>
        </div>
        <button id="logout-btn" onclick="signOut()"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="main-content" id="main-content" style="display:none; width: 100%;">
        <div class="action-grid">
            <div class="action-card" id="manuals-btn">
                <a href="https://smart-bowling.github.io/MANUALS-SMART/" class="action-btn">
                    <i class="fas fa-book-open"></i>
                    <span>Manuals</span>
                </a>
            </div>
            <div class="action-card" id="store-btn">
                <a href="https://smart-bowling.github.io/PARTS-STORE/" class="action-btn">
                    <i class="fas fa-bag-shopping"></i>
                    <span>Store</span>
                </a>
            </div>
            <div class="action-card" id="card-parts">
                <button class="action-btn" onclick="handleAction('parts', this)">
                    <i class="fas fa-gears"></i>
                    <span>Parts</span>
                </button>
                <div class="club-bubbles" id="bubbles-parts"></div>
            </div>
            <div class="action-card" id="card-maintenance">
                <button class="action-btn" onclick="handleAction('maintenance', this)">
                    <i class="fas fa-screwdriver-wrench"></i>
                    <span>Maintenance</span>
                </button>
                <div class="club-bubbles" id="bubbles-maintenance"></div>
            </div>
            <div class="action-card" id="card-fps">
                <button class="action-btn" onclick="handleAction('fps', this)">
                    <i class="fas fa-chart-line"></i>
                    <span>FPS</span>
                </button>
                <div class="club-bubbles" id="bubbles-fps"></div>
            </div>
            <div class="action-card" id="card-analysis">
                <button class="action-btn" onclick="handleAction('analysis', this)">
                    <i class="fas fa-bowling-ball"></i>
                    <span>Analysis</span>
                </button>
                <div class="club-bubbles" id="bubbles-analysis"></div>
            </div>
        </div>
    </div>
</div>

<script>
const userPermissions = {
    'vadiksss900@gmail.com': { manuals:true, store:true, luckyStrike:{parts:true,maintenance:true,fps:true}, blockbuster:{parts:true,maintenance:true,analysis:true,fps:true}, skymall:{parts:true,maintenance:true,analysis:true,fps:true} },
    'csportsua@gmail.com': { manuals:true, store:false, luckyStrike:{parts:false,maintenance:false,fps:false}, blockbuster:{parts:false,maintenance:false,analysis:false,fps:false}, skymall:{parts:true,maintenance:false,analysis:false,fps:false} }
};

const linksMap = {
    parts:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PARTS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PARTS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PARTS-SKYMALL/', key:'skymall'}
    ],
    maintenance:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/SMB-LS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/SMB-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/SMB-SKYMALL/', key:'skymall'}
    ],
    fps:[
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PS-STOP-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PS-STOP-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PS-STOP-SKYMALL/', key:'skymall'}
    ],
    analysis:[
        {name:'Blockbuster', url:'https://smart-bowling.github.io/ANALYSIS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/ANALYSIS-SM/', key:'skymall'}
    ]
};

// Текущая активная карточка
let activeCard = null;

function handleCredentialResponse(response) {
    const payload = parseJwt(response.credential);
    const email = payload.email.toLowerCase();
    if (userPermissions[email]) loginUser(payload); else alert('Access Denied');
}

function loginUser(payload) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    applyPermissions(payload.email.toLowerCase());
}

function handleAction(type, buttonElement) {
    const email = localStorage.getItem('userEmail');
    const p = userPermissions[email];
    const available = linksMap[type].filter(item => p[item.key] && p[item.key][type]);
    
    if (available.length === 1) {
        window.location.href = available[0].url;
    } else if (available.length > 1) {
        const card = buttonElement.closest('.action-card');
        const bubblesContainer = document.getElementById(`bubbles-${type}`);
        
        // Если кликнули на ту же карточку - закрываем
        if (activeCard === card) {
            closeAllBubbles();
            return;
        }
        
        // Закрываем предыдущие
        closeAllBubbles();
        
        // Создаем баблы
        createBubbles(bubblesContainer, available, type);
        
        // Добавляем эффект пульсации
        card.classList.add('pulse');
        setTimeout(() => card.classList.remove('pulse'), 1000);
        
        activeCard = card;
    }
}

function createBubbles(container, links, type) {
    container.innerHTML = '';
    
    links.forEach((link, index) => {
        const bubble = document.createElement('a');
        bubble.href = link.url;
        bubble.className = `club-bubble pos-${index + 1}`;
        bubble.innerHTML = `${link.name} <i class="fas fa-arrow-right"></i>`;
        
        // Добавляем небольшую задержку для каждой кнопки
        setTimeout(() => {
            bubble.classList.add('active');
        }, index * 100);
        
        container.appendChild(bubble);
    });
}

function closeAllBubbles() {
    document.querySelectorAll('.club-bubbles').forEach(container => {
        container.innerHTML = '';
    });
    activeCard = null;
}

// Закрываем баблы при клике вне их
document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-card')) {
        closeAllBubbles();
    }
});

function applyPermissions(email) {
    const p = userPermissions[email];
    document.getElementById('manuals-btn').classList.toggle('disabled', !p.manuals);
    document.getElementById('store-btn').classList.toggle('disabled', !p.store);
    
    Object.keys(linksMap).forEach(type => {
        const hasAccess = linksMap[type].some(item => p[item.key] && p[item.key][type]);
        document.getElementById(`card-${type}`).classList.toggle('disabled', !hasAccess);
    });
}

function parseJwt(token) {
    return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
}

function signOut() { 
    localStorage.clear(); 
    location.reload(); 
}

window.onload = () => {
    if (localStorage.getItem('userLoggedIn') === 'true') {
        const email = localStorage.getItem('userEmail');
        const name = localStorage.getItem('userName');
        const pic = localStorage.getItem('userPic');
        
        if (userPermissions[email]) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-info').style.display = 'flex';
            
            document.getElementById('user-name').textContent = name || 'User';
            document.getElementById('user-email').textContent = email;
            if (pic) document.getElementById('user-pic').src = pic;
            
            applyPermissions(email);
        } else {
            signOut();
        }
    }
}
</script>
</body>
</html>
