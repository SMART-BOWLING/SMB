<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMB | Premium Dashboard</title>

    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/QNkbRTbS/1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #e11d48;
            --accent-hover: #be123c;
            --bg: #1f2937;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            padding: 15px;
            color: var(--text-dark);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        #login, #user-info, #access-denied {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: none;
        }

        #user-info {
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            text-align: left;
            padding: 12px 15px;
            max-width: 100%;
            background: var(--card-bg);
            border: none;
        }

        #user-pic {
            border-radius: 12px;
            width: 44px;
            height: 44px;
            object-fit: cover;
            border: none;
        }

        .user-details p { margin: 0; font-size: 14px; font-weight: 700; color: var(--text-dark); }
        #user-email { font-weight: 400; color: var(--text-muted); font-size: 12px; }

        #logout-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        #logout-btn:hover { background: var(--accent); color: white; }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: visible;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            border: none;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .action-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            border-radius: 20px;
            position: relative;
            z-index: 2;
        }

        .action-btn i {
            font-size: 26px;
            color: #1f2937;
            transition: var(--transition);
        }

        .action-btn span {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            color: var(--text-dark);
        }

        .action-card:hover .action-btn i {
            color: var(--accent);
            transform: scale(1.1);
        }

        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 100;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 10px;
            margin: 0 auto 20px auto;
            opacity: 0.5;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            text-align: center;
        }

        .sheet-clubs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .club-sheet-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f8fafc;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        .club-sheet-btn:hover {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
            box-shadow: 0 8px 15px -6px rgba(0, 0, 0, 0.3);
        }

        .club-sheet-btn i {
            color: #1f2937;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .club-sheet-btn:hover i {
            color: white;
        }

        .close-sheet-btn {
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            padding: 16px;
            background: none;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .close-sheet-btn:hover {
            background: #f1f5f9;
            border-color: var(--text-muted);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .action-card.pulse {
            animation: pulse 1s ease;
        }

        .disabled { 
            opacity: 0.4; 
            pointer-events: none; 
            filter: grayscale(1);
        }

        .disabled .action-btn i {
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .action-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 12px;
            }
            .action-btn { padding: 10px; }
            .action-btn i { font-size: 24px; }
            .action-btn span { font-size: 10px; }
            
            .sheet-clubs-list {
                max-width: 100%;
            }
            .close-sheet-btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <div style="width: 50px; height: 50px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-shield-halved" style="font-size: 24px; color: var(--accent);"></i>
        </div>
        <h2 style="margin: 0 0 5px; font-weight: 800; font-size: 20px;">SMB Dashboard</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Sign in to access</p>
        <div id="g_id_onload" 
             data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse" 
             data-auto_prompt="false"
             data-auto_select="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="outline" 
             data-text="signin_with" 
             data-size="large" 
             data-logo_alignment="left">
        </div>
    </div>

    <div id="user-info">
        <img id="user-pic" src="" alt="Profile">
        <div class="user-details" style="flex-grow:1">
            <p id="user-name"></p>
            <p id="user-email"></p>
        </div>
        <button id="logout-btn" onclick="signOut()"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="main-content" id="main-content" style="display:none; width: 100%;">
        <div class="action-grid">
            <div class="action-card" id="manuals-btn">
                <a href="https://smart-bowling.github.io/MANUALS-SMART/" class="action-btn">
                    <i class="fas fa-book-open"></i>
                    <span>Manuals</span>
                </a>
            </div>
            <div class="action-card" id="store-btn">
                <a href="https://smart-bowling.github.io/PARTS-STORE/" class="action-btn">
                    <i class="fas fa-bag-shopping"></i>
                    <span>Store</span>
                </a>
            </div>
            <div class="action-card" id="card-parts">
                <button class="action-btn" onclick="handleAction('parts', this)">
                    <i class="fas fa-gears"></i>
                    <span>Parts</span>
                </button>
            </div>
            <div class="action-card" id="card-maintenance">
                <button class="action-btn" onclick="handleAction('maintenance', this)">
                    <i class="fas fa-screwdriver-wrench"></i>
                    <span>Maintenance</span>
                </button>
            </div>
            <div class="action-card" id="card-fps">
                <button class="action-btn" onclick="handleAction('fps', this)">
                    <i class="fas fa-chart-line"></i>
                    <span>FPS</span>
                </button>
            </div>
            <div class="action-card" id="card-analysis">
                <button class="action-btn" onclick="handleAction('analysis', this)">
                    <i class="fas fa-bowling-ball"></i>
                    <span>Analysis</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet для выбора ресурса -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="clubSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Выберите ресурс</div>
    <div class="sheet-clubs-list" id="sheetClubsList"></div>
    <button class="close-sheet-btn" onclick="closeClubSheet()">Закрыть</button>
</div>

<script>
// Конфигурация - ЗАМЕНИТЕ НА ВАШ URL!
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwn-sgGtWe4_6pztX6Ys6c2y3dYpQKyHpMd-PCKXlBEMG_uMwmtRet296Y0dXZzcSQjg/exec';

// Глобальные переменные
let currentUser = null;
let userLinks = [];

// Обработка ответа Google
function handleCredentialResponse(response) {
    console.log("Google response received");
    
    try {
        const payload = parseJwt(response.credential);
        console.log("User email:", payload.email);
        
        // Сохраняем пользователя временно
        currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
        };
        
        // Показываем индикатор загрузки
        showLoading(true);
        
        // Проверяем email через Google Apps Script
        checkEmailAccess(currentUser.email);
        
    } catch (e) {
        console.error("Error parsing Google response:", e);
        showLoading(false);
        alert('Ошибка аутентификации');
    }
}

// Проверка email через скрипт
function checkEmailAccess(email) {
    // Добавляем timestamp для избежания кэширования
    const timestamp = new Date().getTime();
    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
    
    // Создаем URL для JSONP запроса
    const url = `${SCRIPT_URL}?action=checkEmail&email=${encodeURIComponent(email)}&callback=${callbackName}&timestamp=${timestamp}`;
    
    console.log('Checking email with JSONP:', url);
    
    // Создаем функцию callback
    window[callbackName] = function(data) {
        console.log('JSONP Response received:', data);
        
        // Очищаем
        delete window[callbackName];
        const script = document.getElementById('jsonpScript');
        if (script) script.remove();
        
        // Обрабатываем ответ
        if (data && data.access === true) {
            console.log('Access granted, links:', data.links);
            userLinks = data.links || [];
            loginUser(currentUser, userLinks);
        } else {
            // Доступ запрещен
            showLoading(false);
            const message = data ? data.message : 'Доступ запрещен';
            alert('Доступ запрещен: ' + message);
            console.log('Unauthorized email:', email, 'Response:', data);
        }
    };
    
    // Создаем и добавляем скрипт
    const script = document.createElement('script');
    script.id = 'jsonpScript';
    script.src = url;
    
    // Обработка ошибок загрузки скрипта
    script.onerror = function() {
        console.error('Failed to load script:', url);
        if (window[callbackName]) {
            window[callbackName]({ 
                access: false, 
                message: 'Не удалось подключиться к серверу. Проверьте URL скрипта.' 
            });
        }
    };
    
    document.body.appendChild(script);
    
    // Таймаут на случай ошибки
    setTimeout(() => {
        if (window[callbackName]) {
            console.log('JSONP timeout');
            window[callbackName]({ 
                access: false, 
                message: 'Таймаут запроса. Сервер не отвечает.' 
            });
        }
    }, 10000);
}

// Функция входа пользователя
function loginUser(user, links) {
    console.log("Logging in user:", user.email);
    
    // Скрываем логин, показываем интерфейс
    document.getElementById('login').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    // Заполняем данные пользователя
    document.getElementById('user-pic').src = user.picture;
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-email').textContent = user.email;
    
    // Сохраняем в localStorage для восстановления сессии
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', user.email);
    localStorage.setItem('userName', user.name);
    localStorage.setItem('userPic', user.picture);
    localStorage.setItem('userLinks', JSON.stringify(links));
    
    // Применяем разрешения
    applyPermissionsFromLinks(links);
    
    // Скрываем индикатор загрузки
    showLoading(false);
}

// Показать/скрыть индикатор загрузки
function showLoading(show) {
    const loginDiv = document.getElementById('login');
    if (show) {
        // Сохраняем оригинальное содержимое
        if (!loginDiv.hasAttribute('data-original')) {
            loginDiv.setAttribute('data-original', loginDiv.innerHTML);
        }
        loginDiv.innerHTML = '<div style="padding: 30px; text-align: center;"><i class="fas fa-spinner fa-spin" style="font-size: 30px; color: var(--accent); margin-bottom: 15px;"></i><br><span style="color: var(--text-muted);">Проверка доступа...</span></div>';
    } else {
        // Восстанавливаем, если нужно
        if (loginDiv.getAttribute('data-original') && document.getElementById('login').style.display !== 'none') {
            loginDiv.innerHTML = loginDiv.getAttribute('data-original');
        }
    }
}

// Применение разрешений на основе ссылок
function applyPermissionsFromLinks(links) {
    // По умолчанию открываем основные разделы
    document.getElementById('manuals-btn').classList.remove('disabled');
    document.getElementById('store-btn').classList.remove('disabled');
    
    // Определяем доступные разделы на основе ссылок
    const hasParts = links.some(link => 
        link.url.toLowerCase().includes('parts') || 
        link.url.toLowerCase().includes('kh') || 
        link.url.toLowerCase().includes('bb') ||
        link.url.toLowerCase().includes('skymall')
    );
    
    const hasMaintenance = links.some(link => 
        link.url.toLowerCase().includes('smb') || 
        link.url.toLowerCase().includes('ls') ||
        link.url.toLowerCase().includes('kh')
    );
    
    const hasFps = links.some(link => 
        link.url.toLowerCase().includes('ps-stop') || 
        link.url.toLowerCase().includes('fps')
    );
    
    const hasAnalysis = links.some(link => 
        link.url.toLowerCase().includes('analysis')
    );
    
    console.log('Permissions:', { hasParts, hasMaintenance, hasFps, hasAnalysis });
    
    document.getElementById('card-parts').classList.toggle('disabled', !hasParts);
    document.getElementById('card-maintenance').classList.toggle('disabled', !hasMaintenance);
    document.getElementById('card-fps').classList.toggle('disabled', !hasFps);
    document.getElementById('card-analysis').classList.toggle('disabled', !hasAnalysis);
}

// Обработка действия (нажатие на карточку)
function handleAction(type, buttonElement) {
    // Получаем ссылки из localStorage
    const links = JSON.parse(localStorage.getItem('userLinks') || '[]');
    
    // Фильтруем ссылки по типу
    const availableLinks = links.filter(link => {
        const url = link.url.toLowerCase();
        switch(type) {
            case 'parts':
                return url.includes('parts') || url.includes('kh') || url.includes('bb') || url.includes('skymall');
            case 'maintenance':
                return url.includes('smb') || url.includes('ls') || url.includes('kh') || url.includes('bb') || url.includes('skymall');
            case 'fps':
                return url.includes('ps-stop') || url.includes('fps') || url.includes('kh') || url.includes('bb') || url.includes('skymall');
            case 'analysis':
                return url.includes('analysis') || url.includes('bb') || url.includes('sm');
            default:
                return false;
        }
    });
    
    if (availableLinks.length === 0) {
        alert('Нет доступных ресурсов для этого раздела');
        return;
    }
    
    if (availableLinks.length === 1) {
        // Если только один доступный ресурс - переходим сразу
        window.location.href = availableLinks[0].url;
    } else if (availableLinks.length > 1) {
        // Если несколько - показываем Bottom Sheet
        const card = buttonElement.closest('.action-card');
        
        // Добавляем эффект пульсации
        card.classList.add('pulse');
        setTimeout(() => card.classList.remove('pulse'), 1000);
        
        // Заполняем и показываем Bottom Sheet
        showClubSheet(type, availableLinks);
    }
}

// Показать Bottom Sheet
function showClubSheet(type, clubs) {
    const sheet = document.getElementById('clubSheet');
    const overlay = document.getElementById('sheetOverlay');
    const title = document.getElementById('sheetTitle');
    const listContainer = document.getElementById('sheetClubsList');
    
    // Устанавливаем заголовок
    let typeName = {
        parts: 'Запчасти',
        maintenance: 'Обслуживание',
        fps: 'FPS',
        analysis: 'Аналитика'
    }[type] || type;
    
    title.textContent = `Выберите ресурс: ${typeName}`;
    
    // Создаем кнопки для каждого ресурса
    listContainer.innerHTML = '';
    clubs.forEach((club, index) => {
        const btn = document.createElement('a');
        btn.href = club.url;
        btn.className = 'club-sheet-btn';
        btn.innerHTML = `${club.name || `Ресурс ${index + 1}`} <i class="fas fa-arrow-right"></i>`;
        btn.target = '_blank';
        btn.rel = 'noopener noreferrer';
        listContainer.appendChild(btn);
    });
    
    // Показываем sheet и overlay
    sheet.classList.add('active');
    overlay.classList.add('active');
    
    // Блокируем прокрутку
    document.body.style.overflow = 'hidden';
}

// Закрыть Bottom Sheet
function closeClubSheet() {
    const sheet = document.getElementById('clubSheet');
    const overlay = document.getElementById('sheetOverlay');
    
    sheet.classList.remove('active');
    overlay.classList.remove('active');
    
    // Возвращаем прокрутку
    document.body.style.overflow = '';
}

// Парсинг JWT токена
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        console.error('Error parsing JWT:', e);
        return {};
    }
}

// Выход из системы
function signOut() { 
    console.log("Signing out");
    localStorage.clear();
    sessionStorage.clear();
    location.reload(); 
}

// Проверка сессии при загрузке
window.addEventListener('load', function() {
    console.log("Page loaded, checking session...");
    
    // Проверяем сохраненную сессию
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const savedEmail = localStorage.getItem('userEmail');
    const savedName = localStorage.getItem('userName');
    const savedPic = localStorage.getItem('userPic');
    const savedLinks = localStorage.getItem('userLinks');
    
    if (isLoggedIn && savedEmail && savedLinks) {
        console.log("Restoring session for:", savedEmail);
        
        try {
            const links = JSON.parse(savedLinks);
            
            // Восстанавливаем интерфейс
            document.getElementById('login').style.display = 'none';
            document.getElementById('user-info').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            
            document.getElementById('user-pic').src = savedPic || 'https://via.placeholder.com/44';
            document.getElementById('user-name').textContent = savedName || 'User';
            document.getElementById('user-email').textContent = savedEmail;
            
            // Применяем разрешения
            applyPermissionsFromLinks(links);
            
            // Сохраняем ссылки в глобальной переменной
            userLinks = links;
            
            console.log("Session restored successfully");
        } catch (e) {
            console.error("Error restoring session:", e);
            signOut();
        }
    } else {
        console.log("No valid session found");
        document.getElementById('login').style.display = 'block';
    }
});

// Закрытие по клику на overlay
document.getElementById('sheetOverlay').addEventListener('click', closeClubSheet);
</script>
</body>
</html>
